<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' }
                    }
                }
            }
        }
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        
        /* Стили карточки с супертонкой фиолетовой границей */
        .word-card { 
            transition: all 0.3s ease; 
            border: 0.5px solid rgba(181, 147, 196, 0.3); /* Супертонкая фиолетовая граница */
            background: white; 
        }
        .word-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 40px -15px rgba(181, 147, 196, 0.15); 
            border-color: rgba(181, 147, 196, 0.6);
        }

        .nav-link { position: relative; font-weight: 800; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; transition: all 0.3s; }
        .nav-link.active { color: #1e293b; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #b593c4; border-radius: 2px; }
        
        .filter-btn { border-radius: 9999px; transition: all 0.2s ease; white-space: nowrap; border: 1px solid #e2e8f0; color: #64748b; padding: 8px 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .filter-btn.active { background-color: #b593c4; color: white; border-color: #b593c4; }
        
        .section-divider { height: 1px; background: linear-gradient(to right, transparent, #f1f5f9, transparent); margin: 60px 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav id="navBar" class="hidden bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-12">
            <div class="font-black text-2xl text-gray-900 tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
            <div class="hidden md:flex gap-8">
                <a href="#" class="nav-link active">Vocabulary</a>
                <a href="#" class="nav-link opacity-40 cursor-not-allowed">Reading</a>
                <a href="#" class="nav-link opacity-40 cursor-not-allowed">Listening</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-brand/10 text-brand px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-brand hover:text-white transition">Teacher Cabinet</button>
            <div id="authSection" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main id="mainContent" class="hidden max-w-7xl mx-auto px-8 py-12">
        
        <section id="librarySection">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                <div>
                    <h2 class="text-4xl font-black text-gray-900 tracking-tighter mb-2">Vocabulary Hub</h2>
                    <p class="text-gray-400 text-sm font-medium">Explore the complete 2026 database</p>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="filterWords('All', this)" class="filter-btn active">All Levels</button>
                    <button onclick="filterWords('Advanced', this)" class="filter-btn">Advanced</button>
                    <button onclick="filterWords('Upper-Intermediate', this)" class="filter-btn">Upper-Int</button>
                    <button onclick="filterWords('Intermediate', this)" class="filter-btn">Intermediate</button>
                    <button onclick="filterWords('Elementary', this)" class="filter-btn">Elementary</button>
                </div>
            </div>
            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <div class="section-divider"></div>

        <section id="myProgressSection" class="bg-gray-50/50 -mx-8 px-8 py-16 rounded-[60px]">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-brand rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand/20">
                        <i class="fa-solid fa-bookmark text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tighter">My Words</h2>
                        <p class="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">Personal Learning Space</p>
                    </div>
                </div>
                <div class="flex bg-white p-1.5 rounded-full border border-gray-100 shadow-sm">
                    <button onclick="filterMyWords('learning', this)" class="my-filter-btn px-8 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition text-gray-400 hover:text-brand">In Progress</button>
                    <button onclick="filterMyWords('mastered', this)" class="my-filter-btn px-8 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition text-gray-400 hover:text-brand">Mastered</button>
                </div>
            </div>
            <div id="myWordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <div id="detailView" class="hidden fixed inset-0 z-[100] bg-white overflow-y-auto p-8 animate-fade-in">
            <button onclick="hideDetail()" class="fixed top-8 left-8 text-gray-400 hover:text-gray-900 font-black text-[10px] uppercase tracking-widest flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Hub
            </button>
            <div id="detailContent" class="max-w-3xl mx-auto mt-20"></div>
        </div>

        <section id="adminPanel" class="hidden mt-20 p-10 bg-gray-900 rounded-[50px] text-white">
            <h2 class="text-2xl font-black mb-8">Add New Content</h2>
            <form id="addWordForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="f-word" class="bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Word" required>
                <select id="f-level" class="bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand">
                    <option class="text-black">Advanced</option>
                    <option class="text-black">Upper-Intermediate</option>
                    <option class="text-black">Intermediate</option>
                    <option class="text-black">Elementary</option>
                </select>
                <input type="text" id="f-pos" class="bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Part of Speech">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="f-syn" class="bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Synonyms">
                    <input type="text" id="f-ant" class="bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Antonyms">
                </div>
                <textarea id="f-def" class="md:col-span-2 bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Definition"></textarea>
                <textarea id="f-ex" class="md:col-span-2 bg-white/10 border-none rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-brand" placeholder="Context Example"></textarea>
                <button type="submit" class="md:col-span-2 bg-brand py-5 rounded-2xl font-black uppercase tracking-widest text-xs">Publish to Database</button>
            </form>
        </section>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-12 rounded-[50px] shadow-2xl text-center">
            <h3 class="text-4xl font-black mb-8 tracking-tighter text-gray-900">TOEFL.ai</h3>
            <div class="space-y-4 text-left">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand">
                <button onclick="handleAuth('login')" class="w-full bg-brand text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-brand/30 transition">Login</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-400 text-[10px] font-black uppercase tracking-widest mt-4">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let wordsData = [];
        let userProgressMap = {}; 
        let libFilter = 'All';
        let myFilter = 'learning';
        let userRole = 'student';
        let currentUser = null;

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profiles } = await _client.from('profiles').select('role').eq('id', currentUser.id);
                userRole = profiles?.[0]?.role || 'student';
                
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
                
                updateUI(true, currentUser.email);
                await loadUserProgress();
                loadWords();
            }
        }

        async function loadUserProgress() {
            const { data } = await _client.from('user_progress').select('word_id, status').eq('user_id', currentUser.id);
            userProgressMap = {};
            data?.forEach(item => userProgressMap[item.word_id] = item.status);
        }

        async function updateWordStatus(wordId, newStatus, event) {
            if (event) event.stopPropagation();
            if (newStatus === userProgressMap[wordId]) newStatus = 'none';

            if (newStatus === 'none') {
                await _client.from('user_progress').delete().eq('user_id', currentUser.id).eq('word_id', wordId);
                delete userProgressMap[wordId];
            } else {
                await _client.from('user_progress').upsert({
                    user_id: currentUser.id, word_id: wordId, status: newStatus
                }, { onConflict: 'user_id, word_id' });
                userProgressMap[wordId] = newStatus;
            }
            renderWords();
        }

        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            if (data) { wordsData = data; renderWords(); }
        }

        function renderWords() {
            const libGrid = document.getElementById('wordsGrid');
            const myGrid = document.getElementById('myWordsGrid');
            
            let filteredLib = libFilter === 'All' ? wordsData : wordsData.filter(w => w.level === libFilter);
            libGrid.innerHTML = filteredLib.map(w => createCardHtml(w, false)).join('');

            let myWords = wordsData.filter(w => userProgressMap[w.id] === myFilter);
            if (myWords.length > 0) {
                myGrid.innerHTML = myWords.map(w => createCardHtml(w, true)).join('');
            } else {
                myGrid.innerHTML = `<div class="col-span-full py-10 text-center text-gray-300 font-bold uppercase tracking-widest text-[10px]">No words in this status yet</div>`;
            }
        }

        function createCardHtml(w, isPersonal) {
            const status = userProgressMap[w.id];
            return `
            <div class="word-card p-8 rounded-[35px] flex flex-col justify-between min-h-[280px] cursor-pointer" onclick="showDetail('${w.id}')">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-2xl font-black text-gray-800 tracking-tighter">${w.word}</h3>
                        <div class="flex gap-1">
                            <button onclick="updateWordStatus('${w.id}', 'learning', event)" class="w-8 h-8 rounded-full border transition flex items-center justify-center ${status === 'learning' ? 'bg-amber-400 border-amber-400 text-white shadow-lg' : 'bg-gray-50 border-gray-100 text-gray-300 hover:text-amber-400'}">
                                <i class="fa-solid fa-bolt text-[10px]"></i>
                            </button>
                            <button onclick="updateWordStatus('${w.id}', 'mastered', event)" class="w-8 h-8 rounded-full border transition flex items-center justify-center ${status === 'mastered' ? 'bg-green-500 border-green-500 text-white shadow-lg' : 'bg-gray-50 border-gray-100 text-gray-300 hover:text-green-500'}">
                                <i class="fa-solid fa-check text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-4">${w.pos}</p>
                    <p class="text-gray-500 text-xs leading-relaxed font-medium line-clamp-3">${w.definition}</p>
                </div>
                <div class="mt-8 flex justify-between items-center border-t border-gray-50 pt-4">
                    <span class="text-[9px] font-black text-brand uppercase tracking-widest">${w.level}</span>
                    <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-500 hover:text-gray-900 transition"><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>`;
        }

        function filterWords(level, btn) {
            libFilter = level;
            document.querySelectorAll('#librarySection .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderWords();
        }

        function filterMyWords(status, btn) {
            myFilter = status;
            document.querySelectorAll('.my-filter-btn').forEach(b => {
                b.classList.remove('text-brand', 'font-black', 'border-b-2', 'border-brand');
                b.classList.add('text-gray-400');
            });
            btn.classList.add('text-brand', 'font-black');
            renderWords();
        }

        function showDetail(id) {
            const w = wordsData.find(item => item.id === id);
            const status = userProgressMap[w.id];
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="animate-fade-in pb-20">
                    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-8">
                        <div>
                            <span class="bg-brand/10 text-brand px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">${w.level}</span>
                            <h2 class="text-8xl font-black text-gray-900 tracking-tighter mt-4 flex items-center gap-6">
                                ${w.word}
                                <button onclick="speak('${w.word}')" class="text-gray-500 hover:text-gray-900 transition"><i class="fa-solid fa-volume-high text-4xl"></i></button>
                            </h2>
                            <p class="text-gray-400 italic text-xl mt-2">${w.pos}</p>
                        </div>
                        <div class="flex gap-4">
                             <button onclick="updateWordStatus('${w.id}', 'learning')" class="px-8 py-4 rounded-2xl text-[10px] font-black uppercase border transition ${status === 'learning' ? 'bg-amber-400 border-amber-400 text-white' : 'border-gray-200 text-gray-400'}">Learning</button>
                             <button onclick="updateWordStatus('${w.id}', 'mastered')" class="px-8 py-4 rounded-2xl text-[10px] font-black uppercase border transition ${status === 'mastered' ? 'bg-green-500 border-green-500 text-white' : 'border-gray-200 text-gray-400'}">Mastered</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                        <div class="md:col-span-2 space-y-12">
                            <section>
                                <h4 class="text-gray-300 font-black text-[10px] uppercase tracking-[0.3em] mb-4">Definition</h4>
                                <p class="text-3xl font-bold text-gray-800 leading-tight">${w.definition}</p>
                            </section>
                            <section class="bg-gray-900 text-white p-12 rounded-[50px] shadow-2xl">
                                <h4 class="text-white/30 font-black text-[10px] uppercase tracking-[0.3em] mb-6">Usage in Context</h4>
                                <p class="text-2xl font-medium leading-relaxed italic">"${w.example}"</p>
                            </section>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-green-50 p-8 rounded-[40px] border-l-8 border-green-200">
                                <h4 class="text-green-700/40 font-black text-[9px] uppercase tracking-widest mb-4">Synonyms</h4>
                                <p class="text-green-800 font-bold text-lg leading-relaxed">${w.synonyms || '-'}</p>
                            </div>
                            <div class="bg-red-50 p-8 rounded-[40px] border-l-8 border-red-100">
                                <h4 class="text-red-700/30 font-black text-[9px] uppercase tracking-widest mb-4">Antonyms</h4>
                                <p class="text-red-800 font-bold text-lg leading-relaxed">${w.antonyms || '-'}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('detailView').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function hideDetail() { document.getElementById('detailView').classList.add('hidden'); }
        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function updateUI(loggedIn, email = '') {
            const authSection = document.getElementById('authSection');
            if (loggedIn) {
                authSection.innerHTML = `<span class="text-[10px] font-black text-gray-400 uppercase">${email}</span><button onclick="_client.auth.signOut().then(()=>location.reload())" class="text-[10px] font-black text-red-400 uppercase hover:text-red-600">Exit</button>`;
                if (userRole === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
            }
        }
        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const { error } = (type === 'login') ? await _client.auth.signInWithPassword({ email, password }) : await _client.auth.signUp({ email, password });
            if (error) alert(error.message); else location.reload();
        }

        document.getElementById('addWordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                word: document.getElementById('f-word').value, level: document.getElementById('f-level').value,
                pos: document.getElementById('f-pos').value, synonyms: document.getElementById('f-syn').value,
                antonyms: document.getElementById('f-ant').value,
                definition: document.getElementById('f-def').value, example: document.getElementById('f-ex').value
            };
            const { error } = await _client.from('vocabulary').insert([payload]);
            if (!error) { document.getElementById('addWordForm').reset(); loadWords(); }
        });

        checkSession();
    </script>
</body>
</html>
