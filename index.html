<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .filter-btn { border-radius: 9999px; transition: all 0.2s; white-space: nowrap; }
        .filter-btn.active { background-color: #b593c4; color: white; box-shadow: 0 4px 12px rgba(181, 147, 196, 0.3); }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-2xl text-gray-800 tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
        
        <div class="flex items-center space-x-4">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-brand text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-brand-dark transition shadow-sm">
                Teacher Panel
            </button>
            
            <div id="authSection">
                <button onclick="showAuthModal()" class="text-gray-400 hover:text-brand font-bold text-sm transition">Log In</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        
        <div id="mainContent">
            <header class="mb-12">
                <h1 class="text-5xl font-black text-gray-900 mb-3 tracking-tighter">Vocabulary Hub</h1>
                <p class="text-gray-400 font-medium">Personalized learning path for TOEFL 2026.</p>
            </header>

            <div class="flex flex-wrap gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterWords('All', this)" class="filter-btn active border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">All</button>
                <button onclick="filterWords('Advanced', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">Advanced</button>
                <button onclick="filterWords('Upper-Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">Upper-Intermediate</button>
                <button onclick="filterWords('Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">Intermediate</button>
            </div>

            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>

        <div id="detailView" class="hidden animate-fade max-w-2xl mx-auto">
            <button onclick="closeDetail()" class="mb-8 text-gray-400 hover:text-brand font-bold text-sm flex items-center transition">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Hub
            </button>
            <div id="detailCard"></div>
        </div>

        <section id="adminPanel" class="hidden mt-20 p-10 bg-gray-50 rounded-[40px] border-2 border-dashed border-brand/30">
            <h2 class="text-2xl font-black mb-8 text-gray-800">Add New Vocabulary Card</h2>
            <form id="addWordForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="f-word" placeholder="Word" class="p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none" required>
                <select id="f-level" class="p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-brand outline-none">
                    <option>Advanced</option>
                    <option>Upper-Intermediate</option>
                    <option>Intermediate</option>
                    <option>Pre-Intermediate</option>
                    <option>Elementary</option>
                </select>
                <input type="text" id="f-pos" placeholder="Part of speech (e.g. verb)" class="p-4 rounded-2xl border-none shadow-sm outline-none">
                <input type="text" id="f-syn" placeholder="Synonyms" class="p-4 rounded-2xl border-none shadow-sm outline-none">
                <textarea id="f-def" placeholder="Definition" class="md:col-span-2 p-4 rounded-2xl border-none shadow-sm outline-none" rows="3"></textarea>
                <textarea id="f-ex" placeholder="Example sentence" class="md:col-span-2 p-4 rounded-2xl border-none shadow-sm outline-none" rows="2"></textarea>
                <button type="submit" class="md:col-span-2 bg-gray-900 text-white font-bold py-5 rounded-2xl hover:bg-black transition shadow-xl">Push to Database</button>
            </form>
        </section>
    </main>

    <div id="authModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl relative animate-fade">
            <button onclick="closeAuthModal()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="text-3xl font-black mb-2 tracking-tighter">Welcome back</h3>
            <p class="text-gray-400 text-sm mb-8">Enter your credentials to continue.</p>
            
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand">
                <button onclick="handleAuth('login')" class="w-full bg-brand text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-brand-dark transition">Sign In</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-brand">Create student account</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSession = null;
        let userRole = 'student';
        let wordsData = [];

        // --- AUTH LOGIC ---
        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                userSession = session.user;
                const { data: profile } = await _client.from('profiles').select('role').eq('id', userSession.id).single();
                userRole = profile?.role || 'student';
                updateUI(true);
            } else {
                updateUI(false);
            }
            loadWords();
        }

        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            
            const { data, error } = (type === 'login') 
                ? await _client.auth.signInWithPassword({ email, password })
                : await _client.auth.signUp({ email, password });

            if (error) alert(error.message);
            else {
                if (type === 'signup') alert("Check your email for confirmation!");
                location.reload();
            }
        }

        function updateUI(loggedIn) {
            const authSection = document.getElementById('authSection');
            const adminBtn = document.getElementById('adminBtn');
            
            if (loggedIn) {
                authSection.innerHTML = `<button onclick="_client.auth.signOut().then(() => location.reload())" class="text-xs font-bold uppercase tracking-widest text-gray-300 hover:text-red-400 transition">Log Out</button>`;
                if (userRole === 'admin') adminBtn.classList.remove('hidden');
            }
        }

        // --- VOCABULARY LOGIC ---
        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            if (data) {
                wordsData = data;
                renderWords(data);
            }
        }

        function renderWords(list) {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = list.map(w => `
                <div class="bg-white p-10 rounded-[35px] border border-gray-100 shadow-sm hover:shadow-xl transition-all cursor-pointer group" onclick="showDetail('${w.id}')">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-3xl font-black text-gray-800 tracking-tighter group-hover:text-brand transition">${w.word}</h3>
                        <span class="text-[10px] font-black uppercase tracking-widest bg-brand-light text-brand px-3 py-1 rounded-full">${w.level}</span>
                    </div>
                    <p class="text-gray-400 italic text-sm mb-4">${w.pos || 'word'}</p>
                    <p class="text-gray-500 line-clamp-2 text-sm leading-relaxed">${w.definition || ''}</p>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const w = wordsData.find(x => x.id === id);
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('detailCard').innerHTML = `
                <div class="bg-white p-12 rounded-[50px] shadow-2xl border border-gray-50">
                    <h2 class="text-7xl font-black text-gray-900 tracking-tighter mb-4">${w.word}</h2>
                    <p class="text-brand font-bold uppercase tracking-widest text-xs mb-10">${w.pos} • ${w.level}</p>
                    
                    <div class="space-y-12">
                        <section>
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-4">Definition</label>
                            <p class="text-2xl text-gray-700 font-medium leading-tight">${w.definition}</p>
                        </section>
                        <section class="bg-gray-50 p-8 rounded-[35px]">
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-4">Usage Example</label>
                            <p class="text-xl text-gray-500 italic">"${w.example}"</p>
                        </section>
                    </div>
                </div>
            `;
        }

        // --- UI HELPERS ---
        function showAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function closeDetail() {
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
        }
        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }

        checkSession();
    </script>
</body>
</html>
