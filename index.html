<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#F3E8FF', 
                            DEFAULT: '#b593c4', 
                            dark: '#9a7aa8',
                        }
                    }
                }
            }
        }
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; scroll-behavior: smooth; }
        .word-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .word-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.08); }
        /* Закругленные кнопки-пилюли */
        .filter-btn { border-radius: 9999px; transition: all 0.2s ease; white-space: nowrap; }
        .filter-btn.active { background-color: #b593c4; color: white; border-color: #b593c4; box-shadow: 0 4px 12px rgba(181, 147, 196, 0.3); }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Скрытие скроллбара для фильтров */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-white text-gray-900">

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-2xl text-gray-800 tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
        
        <div class="flex items-center space-x-4">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-brand text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] hover:bg-brand-dark transition shadow-lg shadow-brand/20">
                Teacher Cabinet
            </button>
            
            <div id="authSection">
                <button onclick="showAuthModal()" class="text-gray-400 hover:text-brand font-bold text-sm transition">Log In</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        
        <div id="listView">
            <header class="mb-12">
                <h1 class="text-5xl font-black text-gray-900 mb-3 tracking-tighter">Vocabulary Hub</h1>
                <p class="text-gray-400 font-medium">Mastering levels from Elementary to Advanced for TOEFL 2026.</p>
            </header>

            <div class="flex flex-wrap gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterWords('All', this)" class="filter-btn active border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">All</button>
                <button onclick="filterWords('Advanced', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">Advanced</button>
                <button onclick="filterWords('Upper-Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">Upper-Intermediate</button>
                <button onclick="filterWords('Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">Intermediate</button>
                <button onclick="filterWords('Pre-Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">Pre-Intermediate</button>
                <button onclick="filterWords('Elementary', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-gray-50">Elementary</button>
            </div>

            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>

        <div id="detailView" class="hidden max-w-3xl mx-auto animate-fade-in">
            <button onclick="hideDetail()" class="text-gray-400 hover:text-gray-700 text-sm mb-8 flex items-center transition group font-bold">
                <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition"></i> Back to Hub
            </button>
            <div id="detailContent"></div>
        </div>

        <section id="adminPanel" class="hidden mt-20 pt-16 border-t border-gray-100">
            <div class="bg-gray-50 p-10 rounded-[40px] border-2 border-dashed border-brand/20 shadow-inner">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-gray-800 flex items-center">
                        <i class="fa-solid fa-pen-nib mr-3 text-brand"></i> Add New Word Card
                    </h2>
                    <button onclick="toggleAdminPanel()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <form id="addWordForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Word</label>
                        <input type="text" id="f-word" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm" placeholder="e.g. Eloquent" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Level</label>
                        <select id="f-level" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm">
                            <option>Advanced</option>
                            <option>Upper-Intermediate</option>
                            <option>Intermediate</option>
                            <option>Pre-Intermediate</option>
                            <option>Elementary</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Part of Speech</label>
                        <input type="text" id="f-pos" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm" placeholder="adj, verb, noun...">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Synonyms</label>
                        <input type="text" id="f-syn" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm" placeholder="Synonyms...">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Definition</label>
                        <textarea id="f-def" rows="2" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm" placeholder="Explain the meaning..."></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest">Context Sentence</label>
                        <textarea id="f-ex" rows="2" class="w-full bg-white border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-brand shadow-sm" placeholder="Full sentence context..."></textarea>
                    </div>
                    <button type="submit" class="md:col-span-2 bg-gray-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-black transition transform active:scale-[0.98] mt-2 uppercase tracking-widest text-xs">
                        Add to Cloud Database
                    </button>
                </form>
            </div>
        </section>
    </main>

    <div id="authModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl relative animate-fade-in">
            <button onclick="closeAuthModal()" class="absolute top-8 right-8 text-gray-300 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="text-4xl font-black mb-2 tracking-tighter">TOEFL Prep</h3>
            <p class="text-gray-400 text-sm mb-8">Personal Cabinet Access</p>
            
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email Address" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand border-none">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-brand border-none">
                <button onclick="handleAuth('login')" class="w-full bg-brand text-white font-black py-5 rounded-2xl shadow-lg hover:bg-brand-dark transition transform active:scale-95">Sign In</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] hover:text-brand transition mt-4">Create New Student Account</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let wordsData = [];
        let currentFilter = 'All';
        let userSession = null;
        let userRole = 'student';

        // --- AUTH & ROLES ---
        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                userSession = session.user;
                // Запрос роли из таблицы profiles
                const { data: profile, error } = await _client
                    .from('profiles')
                    .select('role')
                    .eq('id', userSession.id)
                    .single();

                if (error) console.error("Profile Error:", error.message);
                userRole = profile?.role || 'student';
                
                console.log("Logged in as:", userSession.email, "| Role:", userRole);
                updateUI(true);
            } else {
                updateUI(false);
            }
            loadWords();
        }

        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            
            const { data, error } = (type === 'login') 
                ? await _client.auth.signInWithPassword({ email, password })
                : await _client.auth.signUp({ email, password });

            if (error) alert(error.message);
            else {
                if (type === 'signup') alert("Welcome! Check your email to verify account.");
                location.reload();
            }
        }

        function updateUI(loggedIn) {
            const authSection = document.getElementById('authSection');
            const adminBtn = document.getElementById('adminBtn');
            
            if (loggedIn) {
                authSection.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest hidden md:block">${userSession.email}</span>
                        <button onclick="_client.auth.signOut().then(() => location.reload())" class="text-xs font-black uppercase tracking-widest text-red-300 hover:text-red-500 transition">Exit</button>
                    </div>
                `;
                // Кнопка появляется ТОЛЬКО если в базе стоит role = 'admin'
                if (userRole === 'admin') adminBtn.classList.remove('hidden');
            }
        }

        // --- VOCABULARY ENGINE ---
        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            if (data) {
                wordsData = data;
                renderWords(data);
            }
        }

        function renderWords(list) {
            const grid = document.getElementById('wordsGrid');
            const filtered = currentFilter === 'All' ? list : list.filter(w => w.level === currentFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-300 italic font-medium">No words found for this level.</div>';
                return;
            }

            grid.innerHTML = filtered.map(w => `
                <div class="word-card bg-white p-10 rounded-[40px] border border-gray-100 shadow-sm flex flex-col justify-between min-h-[280px] cursor-pointer group" onclick="showDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-3xl font-black text-gray-800 tracking-tighter group-hover:text-brand transition">${w.word}</h3>
                            <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-200 hover:text-brand transition">
                                <i class="fa-solid fa-volume-high text-xl"></i>
                            </button>
                        </div>
                        <p class="text-gray-400 italic text-[10px] mb-6 font-black uppercase tracking-[0.2em]">${w.pos || 'vocabulary'}</p>
                        <p class="text-gray-500 text-sm leading-relaxed line-clamp-3 font-medium">${w.definition || ''}</p>
                    </div>
                    <div class="mt-8 flex justify-between items-center">
                        <span class="inline-block bg-brand-light text-brand-dark text-[9px] px-4 py-1.5 rounded-full font-black uppercase tracking-widest">${w.level}</span>
                        ${userRole === 'admin' ? '<i class="fa-solid fa-pen-to-square text-brand/30"></i>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterWords(level, btn) {
            currentFilter = level;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderWords(wordsData);
        }

        function showDetail(id) {
            const w = wordsData.find(item => item.id === id);
            const content = document.getElementById('detailContent');
            
            content.innerHTML = `
                <div class="bg-white p-12 rounded-[50px] border border-gray-100 shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-7xl font-black text-brand tracking-tighter">${w.word}</h2>
                        <button onclick="speak('${w.word}')" class="text-gray-200 hover:text-brand transition"><i class="fa-solid fa-volume-high text-4xl"></i></button>
                    </div>
                    <p class="text-gray-400 italic text-sm mb-10 font-black uppercase tracking-[0.3em]">${w.pos || ''} • ${w.level}</p>
                    
                    <div class="space-y-12">
                        <section>
                            <h4 class="font-black text-gray-300 mb-4 text-[10px] uppercase tracking-[0.2em]">Definition</h4>
                            <p class="text-gray-700 text-2xl leading-tight font-semibold">${w.definition || '-'}</p>
                        </section>
                        <section class="bg-gray-50 p-10 rounded-[40px] border-l-[12px] border-brand">
                            <h4 class="font-black text-gray-300 mb-4 text-[10px] uppercase tracking-[0.2em]">Context Example</h4>
                            <p class="text-gray-500 italic text-xl leading-relaxed">"${w.example || '-'}"</p>
                        </section>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 pt-10 border-t border-gray-50">
                            <div>
                                <h4 class="font-black text-gray-300 mb-2 text-[10px] uppercase tracking-[0.2em]">Synonyms</h4>
                                <p class="text-brand font-black text-xl tracking-tight">${w.synonyms || '-'}</p>
                            </div>
                            <div>
                                <h4 class="font-black text-gray-300 mb-2 text-[10px] uppercase tracking-[0.2em]">Antonyms</h4>
                                <p class="text-gray-400 font-black text-xl tracking-tight">${w.antonyms || '-'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // --- UI HELPERS ---
        function hideDetail() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden');
        }
        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function showAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        // --- FORM SUBMIT ---
        document.getElementById('addWordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                word: document.getElementById('f-word').value,
                level: document.getElementById('f-level').value,
                pos: document.getElementById('f-pos').value,
                definition: document.getElementById('f-def').value,
                example: document.getElementById('f-ex').value,
                synonyms: document.getElementById('f-syn').value
            };
            const { error } = await _client.from('vocabulary').insert([payload]);
            if (error) alert(error.message);
            else {
                alert('Success! Word added.');
                document.getElementById('addWordForm').reset();
                loadWords();
            }
        });

        checkSession();
    </script>
</body>
</html>
