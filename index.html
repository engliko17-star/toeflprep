<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .word-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .word-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.05); }
        .filter-btn { border-radius: 9999px; transition: all 0.2s ease; white-space: nowrap; }
        .filter-btn.active { background-color: #b593c4; color: white; border-color: #b593c4; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Стили для кнопок статуса */
        .status-badge { font-[900] text-[9px] uppercase tracking-widest px-3 py-1 rounded-full border; }
        .status-learning { background: #fffbeb; color: #d97706; border-color: #fef3c7; }
        .status-mastered { background: #f0fdf4; color: #16a34a; border-color: #dcfce7; }
        .status-already_know { background: #f8fafc; color: #64748b; border-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen bg-white text-gray-900">

    <nav id="navBar" class="hidden bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-2xl text-gray-800 tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
        <div id="navRight" class="flex items-center space-x-4">
            <div id="userStats" class="hidden md:flex gap-4 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-amber-400"></div><span id="stat-learning" class="text-[10px] font-black text-gray-500 uppercase">0 Learning</span></div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500"></div><span id="stat-mastered" class="text-[10px] font-black text-gray-500 uppercase">0 Mastered</span></div>
            </div>
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-brand text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">Teacher Cabinet</button>
            <div id="authSection"></div>
        </div>
    </nav>

    <main id="mainContent" class="hidden max-w-6xl mx-auto px-6 py-12">
        <div id="listView">
            <header class="mb-12">
                <h1 class="text-5xl font-black text-gray-900 mb-3 tracking-tighter">Vocabulary Hub</h1>
                <p class="text-gray-400 font-medium">Manage your TOEFL progress states.</p>
            </header>

            <div class="flex flex-wrap gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterWords('All', this)" class="filter-btn active border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">All</button>
                <button onclick="filterWords('learning', this)" class="filter-btn border border-amber-200 text-amber-600 px-6 py-2 text-[11px] font-bold uppercase tracking-widest bg-amber-50">Learning</button>
                <button onclick="filterWords('mastered', this)" class="filter-btn border border-green-200 text-green-600 px-6 py-2 text-[11px] font-bold uppercase tracking-widest bg-green-50">Mastered</button>
                <div class="w-px h-8 bg-gray-100 mx-2"></div>
                <button onclick="filterWords('Advanced', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">Advanced</button>
                <button onclick="filterWords('Intermediate', this)" class="filter-btn border border-gray-200 text-gray-500 px-6 py-2 text-[11px] font-bold uppercase tracking-widest">Intermediate</button>
            </div>

            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="detailView" class="hidden max-w-3xl mx-auto animate-fade-in">
            <button onclick="hideDetail()" class="text-gray-400 hover:text-gray-700 text-sm mb-8 flex items-center font-bold">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Hub
            </button>
            <div id="detailContent"></div>
        </div>
        
        <section id="adminPanel" class="hidden mt-20 pt-16 border-t border-gray-100">
             </section>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl relative animate-fade-in text-center">
            <h3 class="text-4xl font-black mb-2 tracking-tighter text-gray-800">TOEFL Prep</h3>
            <div class="space-y-4 mt-8 text-left">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-brand">
                <button onclick="handleAuth('login')" class="w-full bg-brand text-white font-black py-5 rounded-2xl shadow-lg hover:bg-brand-dark transition">Sign In</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] hover:text-brand transition mt-4">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let wordsData = [];
        let userProgressMap = {}; // wordId: status
        let currentFilter = 'All';
        let userRole = 'student';
        let currentUser = null;

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profiles } = await _client.from('profiles').select('role').eq('id', currentUser.id);
                userRole = profiles?.[0]?.role || 'student';
                
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
                
                updateUI(true, currentUser.email);
                await loadUserProgress();
                loadWords();
            }
        }

        async function loadUserProgress() {
            const { data } = await _client.from('user_progress').select('word_id, status').eq('user_id', currentUser.id);
            userProgressMap = {};
            data?.forEach(item => userProgressMap[item.word_id] = item.status);
            updateStatsUI();
        }

        function updateStatsUI() {
            const learning = Object.values(userProgressMap).filter(s => s === 'learning').length;
            const mastered = Object.values(userProgressMap).filter(s => s === 'mastered').length;
            document.getElementById('stat-learning').innerText = `${learning} Learning`;
            document.getElementById('stat-mastered').innerText = `${mastered} Mastered`;
            document.getElementById('userStats').classList.remove('hidden');
        }

        async function updateWordStatus(wordId, newStatus, event) {
            if (event) event.stopPropagation();
            
            if (newStatus === 'none') {
                await _client.from('user_progress').delete().eq('user_id', currentUser.id).eq('word_id', wordId);
                delete userProgressMap[wordId];
            } else {
                const { data } = await _client.from('user_progress').upsert({
                    user_id: currentUser.id,
                    word_id: wordId,
                    status: newStatus
                }, { onConflict: 'user_id, word_id' });
                userProgressMap[wordId] = newStatus;
            }
            
            updateStatsUI();
            renderWords(wordsData);
            if (!document.getElementById('detailView').classList.contains('hidden')) {
                showDetail(wordId);
            }
        }

        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            if (data) { wordsData = data; renderWords(data); }
        }

        function renderWords(list) {
            const grid = document.getElementById('wordsGrid');
            let filtered = list;
            
            if (['learning', 'mastered'].includes(currentFilter)) {
                filtered = list.filter(w => userProgressMap[w.id] === currentFilter);
            } else if (currentFilter !== 'All') {
                filtered = list.filter(w => w.level === currentFilter);
            }
            
            // Скрываем те, что отмечены "Already Know" (чтобы не загромождать выдачу)
            filtered = filtered.filter(w => userProgressMap[w.id] !== 'already_know');

            grid.innerHTML = filtered.map(w => {
                const status = userProgressMap[w.id];
                return `
                <div class="word-card bg-white p-10 rounded-[40px] border border-gray-100 flex flex-col justify-between min-h-[320px] cursor-pointer group" onclick="showDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-3xl font-black text-gray-800 tracking-tighter group-hover:text-brand transition">${w.word}</h3>
                            <div class="flex flex-col gap-1">
                                ${status ? `<span class="status-badge status-${status}">${status.replace('_', ' ')}</span>` : ''}
                            </div>
                        </div>
                        <p class="text-gray-500 text-sm leading-relaxed line-clamp-3 font-medium">${w.definition || ''}</p>
                    </div>
                    
                    <div class="mt-8">
                        <div class="flex gap-2 mb-6">
                            <button onclick="updateWordStatus('${w.id}', 'learning', event)" class="flex-1 text-[9px] font-black uppercase py-2 rounded-xl border border-amber-100 text-amber-600 hover:bg-amber-50 transition">Learning</button>
                            <button onclick="updateWordStatus('${w.id}', 'mastered', event)" class="flex-1 text-[9px] font-black uppercase py-2 rounded-xl border border-green-100 text-green-600 hover:bg-green-50 transition">Mastered</button>
                            <button onclick="updateWordStatus('${w.id}', 'already_know', event)" class="p-2 text-gray-300 hover:text-gray-600" title="I already know this"><i class="fa-solid fa-eye-slash"></i></button>
                        </div>
                        <div class="flex justify-between items-center border-t border-gray-50 pt-4">
                            <span class="text-[9px] font-black text-brand-dark uppercase tracking-widest">${w.level}</span>
                            <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-500 hover:text-gray-800"><i class="fa-solid fa-volume-high"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function showDetail(id) {
            const w = wordsData.find(item => item.id === id);
            const status = userProgressMap[w.id];
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="bg-white p-12 rounded-[50px] border border-gray-100 shadow-2xl relative animate-fade-in">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h2 class="text-7xl font-black text-brand tracking-tighter">${w.word}</h2>
                            <p class="text-gray-400 italic text-sm mt-2 font-black uppercase tracking-[0.3em]">${w.pos} • ${w.level}</p>
                        </div>
                        <div class="flex flex-col gap-3 items-end">
                            <div class="flex gap-2">
                                <button onclick="updateWordStatus('${w.id}', 'learning')" class="px-4 py-2 rounded-full text-[10px] font-black uppercase border ${status === 'learning' ? 'bg-amber-400 border-amber-400 text-white' : 'border-gray-200 text-gray-400'}">Learning</button>
                                <button onclick="updateWordStatus('${w.id}', 'mastered')" class="px-4 py-2 rounded-full text-[10px] font-black uppercase border ${status === 'mastered' ? 'bg-green-500 border-green-500 text-white' : 'border-gray-200 text-gray-400'}">Mastered</button>
                            </div>
                            <button onclick="updateWordStatus('${w.id}', 'none')" class="text-[9px] font-bold text-gray-300 hover:text-red-400 uppercase tracking-widest underline">Reset status</button>
                        </div>
                    </div>
                    
                    <div class="space-y-10">
                        <section><h4 class="font-black text-gray-300 mb-2 text-[10px] uppercase tracking-[0.2em]">Definition</h4><p class="text-gray-700 text-2xl font-semibold">${w.definition}</p></section>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="bg-green-50 p-6 rounded-3xl border-l-4 border-green-200"><h4 class="text-green-700/40 font-black text-[9px] uppercase mb-2">Synonyms</h4><p class="text-green-800 font-bold">${w.synonyms || '-'}</p></div>
                            <div class="bg-red-50 p-6 rounded-3xl border-l-4 border-red-100"><h4 class="text-red-700/30 font-black text-[9px] uppercase mb-2">Antonyms</h4><p class="text-red-800 font-bold">${w.antonyms || '-'}</p></div>
                        </div>
                        <section class="bg-gray-50 p-8 rounded-[40px] border-l-[10px] border-brand"><p class="text-gray-500 italic text-xl">"${w.example}"</p></section>
                    </div>
                </div>`;
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
        }

        // Вспомогательные функции остаются как в прошлой версии
        function filterWords(level, btn) {
            currentFilter = level;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderWords(wordsData);
        }
        function hideDetail() { document.getElementById('detailView').classList.add('hidden'); document.getElementById('listView').classList.remove('hidden'); }
        function updateUI(loggedIn, email = '') {
            const authSection = document.getElementById('authSection');
            if (loggedIn) {
                authSection.innerHTML = `<span class="text-[10px] font-black text-gray-300 mr-4 uppercase">${email}</span><button onclick="_client.auth.signOut().then(()=>location.reload())" class="text-[10px] font-black text-red-400 uppercase">Exit</button>`;
                if (userRole === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
            }
        }
        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const { error } = (type === 'login') ? await _client.auth.signInWithPassword({ email, password }) : await _client.auth.signUp({ email, password });
            if (error) alert(error.message); else location.reload();
        }

        checkSession();
    </script>
</body>
</html>
