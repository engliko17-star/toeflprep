<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' } }
                }
            }
        }
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; }
        .word-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; background: white; border-radius: 40px; padding: 40px; }
        .word-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03); }
        .filter-btn { border-radius: 9999px; padding: 10px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid #f1f5f9; color: #94a3b8; transition: 0.2s; }
        .filter-btn.active { background-color: #1e293b; color: white; border-color: #1e293b; }
        .status-pill { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 20px; border-radius: 12px; transition: all 0.2s; }
        .detail-badge { background: #f8f9fa; color: #b593c4; padding: 6px 16px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .side-card { border-radius: 32px; padding: 32px; border: 1px solid #f8fafc; background: #ffffff; }
    </style>
</head>
<body>

    <nav id="navBar" class="hidden px-12 py-8 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-16">
            <div class="font-black text-3xl tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black uppercase text-brand tracking-widest border-b-2 border-brand pb-1">Vocabulary</span>
                <div class="flex items-center gap-3 ml-4">
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-amber-400"></div><span id="count-learning" class="text-[9px] font-bold uppercase text-gray-400">0 Learning</span></div>
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-green-500"></div><span id="count-mastered" class="text-[9px] font-bold uppercase text-gray-400">0 Mastered</span></div>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-[#d9c8e1] text-white px-8 py-3 rounded-full text-[10px] font-black uppercase shadow-sm">Teacher Cabinet</button>
            <div id="authSection" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main id="mainContent" class="hidden max-w-[1600px] mx-auto px-12 py-12">
        
        <section>
            <h1 class="text-6xl font-black tracking-tighter mb-4">Vocabulary Hub</h1>
            <p class="text-gray-400 font-medium mb-12">Manage your TOEFL progress states.</p>
            
            <div class="flex gap-3 mb-16 overflow-x-auto pb-4">
                <button onclick="filterWords('All', this)" class="filter-btn active">All</button>
                <button onclick="filterWords('Learning', this)" class="filter-btn">Learning</button>
                <button onclick="filterWords('Mastered', this)" class="filter-btn">Mastered</button>
                <div class="w-px h-8 bg-gray-100 mx-4"></div>
                <button onclick="filterWords('Advanced', this)" class="filter-btn">Advanced</button>
                <button onclick="filterWords('Intermediate', this)" class="filter-btn">Intermediate</button>
            </div>

            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </section>

        <section id="myWordsSection" class="mt-32">
            <div class="flex items-center gap-4 mb-12">
                <h2 class="text-4xl font-black tracking-tighter">My words</h2>
                <span class="text-brand font-bold text-2xl lowercase">open</span>
            </div>
            <div id="myWordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </section>

        <div id="detailView" class="hidden fixed inset-0 z-[100] bg-white overflow-y-auto">
            <header class="flex justify-between items-center px-12 py-8 sticky top-0 bg-white/90 backdrop-blur-md">
                <button onclick="hideDetail()" class="text-gray-400 font-bold text-[11px] uppercase tracking-widest flex items-center gap-3 hover:text-gray-900 transition"><i class="fa-solid fa-arrow-left"></i> К центру</button>
                <div class="flex items-center gap-4">
                    <button id="editBtn" class="hidden w-11 h-11 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:bg-brand/10 hover:text-brand transition">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <div id="statusButtons" class="flex gap-3"></div>
                </div>
            </header>
            <div id="detailContent" class="max-w-7xl mx-auto px-12 py-20"></div>
        </div>

        <section id="adminPanel" class="hidden mt-20 p-12 bg-gray-900 rounded-[60px] text-white">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black">Teacher Console</h2>
                <button onclick="toggleAdminPanel()" class="text-white/20 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <form id="addWordForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <input type="hidden" id="f-id">
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Word</label><input type="text" id="f-word" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 outline-none focus:border-brand transition" required></div>
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Level</label><select id="f-level" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 outline-none appearance-none"><option>Advanced</option><option>Intermediate</option><option>Elementary</option></select></div>
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Part of Speech</label><input type="text" id="f-pos" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6"></div>
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Progress %</label><input type="number" id="f-progress" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6"></div>
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Synonyms</label><input type="text" id="f-syn" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6"></div>
                <div class="space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Antonyms</label><input type="text" id="f-ant" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6"></div>
                <div class="md:col-span-2 space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Definition</label><textarea id="f-def" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 h-32"></textarea></div>
                <div class="md:col-span-2 space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Usage Tip</label><textarea id="f-tip" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 h-32"></textarea></div>
                <div class="md:col-span-2 space-y-2"><label class="text-[10px] font-black uppercase text-white/30 ml-4">Context Example</label><textarea id="f-ex" class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 h-32"></textarea></div>
                <button type="submit" class="md:col-span-2 bg-brand py-6 rounded-3xl font-black uppercase tracking-widest hover:bg-brand-dark transition shadow-xl shadow-brand/20">Sync to Cloud</button>
            </form>
        </section>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-16 rounded-[60px] text-center shadow-2xl">
            <h3 class="text-5xl font-black mb-10 tracking-tighter">TOEFL.ai</h3>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" class="w-full p-6 bg-gray-50 rounded-3xl outline-none focus:ring-2 ring-brand/20 transition">
                <input type="password" id="authPass" placeholder="Password" class="w-full p-6 bg-gray-50 rounded-3xl outline-none focus:ring-2 ring-brand/20 transition">
                <button onclick="handleAuth()" class="w-full bg-[#1e293b] text-white font-black py-6 rounded-3xl mt-4 hover:bg-black transition">Sign In</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let wordsData = [];
        let userProgressMap = {};
        let libFilter = 'All';
        let userRole = 'student';
        let currentUser = null;
        let currentDetailId = null;

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profiles } = await _client.from('profiles').select('role').eq('id', currentUser.id);
                userRole = profiles?.[0]?.role || 'student';
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
                updateUI(true, currentUser.email);
                await loadUserProgress();
                loadWords();
            }
        }

        async function loadUserProgress() {
            const { data } = await _client.from('user_progress').select('word_id, status').eq('user_id', currentUser.id);
            userProgressMap = {};
            let learnCount = 0; let masterCount = 0;
            data?.forEach(item => {
                userProgressMap[item.word_id] = item.status;
                if(item.status === 'learning') learnCount++;
                if(item.status === 'mastered') masterCount++;
            });
            document.getElementById('count-learning').innerText = `${learnCount} Learning`;
            document.getElementById('count-mastered').innerText = `${masterCount} Mastered`;
        }

        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            wordsData = data || []; 
            renderWords();
        }

        function renderWords() {
            const libGrid = document.getElementById('wordsGrid');
            const myGrid = document.getElementById('myWordsGrid');
            
            // Фильтр главного хаба
            let filtered = wordsData;
            if(libFilter === 'Learning' || libFilter === 'Mastered') {
                filtered = wordsData.filter(w => userProgressMap[w.id] === libFilter.toLowerCase());
            } else if (libFilter !== 'All') {
                filtered = wordsData.filter(w => w.level === libFilter);
            }
            
            libGrid.innerHTML = filtered.map(w => createCard(w)).join('');
            
            // Фильтр для My Words (показываем всё, что имеет статус)
            let myWords = wordsData.filter(w => userProgressMap[w.id]);
            myGrid.innerHTML = myWords.map(w => createCard(w)).join('');
            
            document.getElementById('myWordsSection').classList.toggle('hidden', myWords.length === 0);
        }

        function createCard(w) {
            const status = userProgressMap[w.id];
            return `
            <div class="word-card flex flex-col justify-between min-h-[380px] cursor-pointer relative" onclick="showDetail('${w.id}')">
                <div>
                    <div class="flex justify-between items-start mb-8">
                        <h3 class="text-4xl font-black tracking-tighter text-gray-900">${w.word}</h3>
                        <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-200 hover:text-brand transition text-xl"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <p class="text-gray-400 font-medium mb-10 leading-relaxed">${w.definition}</p>
                    
                    <div class="flex gap-2 mb-10">
                        <button onclick="event.stopPropagation(); updateStatus('${w.id}', 'learning')" 
                                class="status-pill ${status === 'learning' ? 'bg-amber-100 text-amber-600 shadow-sm' : 'bg-gray-50 text-gray-300 hover:bg-gray-100'}">Learning</button>
                        <button onclick="event.stopPropagation(); updateStatus('${w.id}', 'mastered')" 
                                class="status-pill ${status === 'mastered' ? 'bg-green-100 text-green-600 shadow-sm' : 'bg-gray-50 text-gray-300 hover:bg-gray-100'}">Mastered</button>
                        <button onclick="event.stopPropagation(); updateStatus('${w.id}', null)" 
                                class="p-2 ml-auto text-gray-200 hover:text-red-400 transition"><i class="fa-solid fa-eye-slash"></i></button>
                    </div>
                </div>
                <div class="flex justify-between items-center pt-8 border-t border-gray-50">
                    <span class="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">${w.level}</span>
                </div>
            </div>`;
        }

        function showDetail(id) {
            currentDetailId = id;
            const w = wordsData.find(item => item.id === id);
            if (!w) return;
            const status = userProgressMap[w.id];

            const editBtn = document.getElementById('editBtn');
            if (userRole === 'admin') {
                editBtn.classList.remove('hidden');
                editBtn.onclick = () => openEditMode();
            }

            document.getElementById('statusButtons').innerHTML = `
                <button onclick="updateStatus('${w.id}', 'learning')" class="px-8 py-3 rounded-2xl text-[10px] font-black transition ${status === 'learning' ? 'bg-amber-400 text-white shadow-lg shadow-amber-400/20' : 'bg-gray-50 text-gray-400'}">Обучение</button>
                <button onclick="updateStatus('${w.id}', 'mastered')" class="px-8 py-3 rounded-2xl text-[10px] font-black transition ${status === 'mastered' ? 'bg-green-500 text-white shadow-lg shadow-green-500/20' : 'bg-gray-50 text-gray-400'}">Освоено</button>`;
            
            document.getElementById('detailContent').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
                    <div class="lg:col-span-2 space-y-16">
                        <div>
                            <span class="detail-badge">${w.level}</span>
                            <div class="flex items-center gap-8 mt-8">
                                <h2 class="text-8xl font-black text-gray-900 tracking-tighter">${w.word}</h2>
                                <button onclick="speak('${w.word}')" class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 hover:text-brand transition text-xl"><i class="fa-solid fa-volume-high"></i></button>
                            </div>
                            <p class="text-gray-400 font-bold mt-4 uppercase tracking-widest text-xs">${w.pos || 'word'}</p>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-gray-300 font-black text-[11px] uppercase tracking-[0.3em]">ОПРЕДЕЛЕНИЕ</h4>
                            <p class="text-5xl font-bold text-gray-800 leading-[1.1] tracking-tight">${w.definition}</p>
                        </div>
                        <div class="bg-gray-900 text-white p-14 rounded-[50px] shadow-2xl relative overflow-hidden">
                             <div class="absolute top-0 right-0 p-8 text-white/5 text-6xl"><i class="fa-solid fa-quote-right"></i></div>
                             <h4 class="text-white/30 text-[10px] font-black uppercase mb-6 tracking-widest">Использование в контексте</h4>
                             <p class="text-2xl italic font-medium leading-relaxed">"${w.example}"</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="side-card bg-[#f8fffb] border-green-50">
                            <h4 class="text-green-600/40 font-black text-[10px] uppercase tracking-widest mb-4">СИНОНИМЫ</h4>
                            <p class="text-green-900 font-bold text-2xl">${w.synonyms || '—'}</p>
                        </div>
                        <div class="side-card bg-[#fff9f9] border-red-50">
                            <h4 class="text-red-600/40 font-black text-[10px] uppercase tracking-widest mb-4">АНТОНИМЫ</h4>
                            <p class="text-red-900 font-bold text-2xl">${w.antonyms || '—'}</p>
                        </div>
                        <div class="side-card border-gray-100 bg-gray-50/30">
                            <h4 class="text-gray-400 font-black text-[10px] uppercase tracking-widest mb-4">ПРОГРЕСС</h4>
                            <div class="flex items-center gap-6">
                                <div class="text-5xl font-black text-gray-900">${w.progress || 0}%</div>
                                <p class="text-[11px] text-gray-400 font-bold leading-tight uppercase">Хорошая работа!<br>Продолжайте в том же духе.</p>
                            </div>
                        </div>
                        ${w.tip ? `
                        <div class="side-card bg-[#fffcf0] border-amber-50">
                            <h4 class="text-amber-600 font-black text-[10px] uppercase tracking-widest mb-4 flex items-center gap-2"><i class="fa-solid fa-lightbulb"></i> СОВЕТ</h4>
                            <p class="text-amber-900 text-[15px] font-medium leading-relaxed">${w.tip}</p>
                        </div>` : ''}
                    </div>
                </div>`;
            document.getElementById('detailView').classList.remove('hidden');
        }

        async function updateStatus(wordId, status) {
            if (status === null || status === userProgressMap[wordId]) {
                await _client.from('user_progress').delete().eq('user_id', currentUser.id).eq('word_id', wordId);
                delete userProgressMap[wordId];
            } else {
                await _client.from('user_progress').upsert({ user_id: currentUser.id, word_id: wordId, status: status });
                userProgressMap[wordId] = status;
            }
            await loadUserProgress();
            renderWords();
            if (!document.getElementById('detailView').classList.contains('hidden')) showDetail(wordId);
        }

        function openEditMode() {
            const w = wordsData.find(item => item.id === currentDetailId);
            if (!w) return;
            document.getElementById('f-id').value = w.id;
            document.getElementById('f-word').value = w.word;
            document.getElementById('f-level').value = w.level;
            document.getElementById('f-pos').value = w.pos || '';
            document.getElementById('f-progress').value = w.progress || 0;
            document.getElementById('f-syn').value = w.synonyms || '';
            document.getElementById('f-ant').value = w.antonyms || '';
            document.getElementById('f-def').value = w.definition;
            document.getElementById('f-tip').value = w.tip || '';
            document.getElementById('f-ex').value = w.example;
            hideDetail();
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('addWordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const payload = {
                word: document.getElementById('f-word').value,
                level: document.getElementById('f-level').value,
                pos: document.getElementById('f-pos').value,
                progress: parseInt(document.getElementById('f-progress').value) || 0,
                synonyms: document.getElementById('f-syn').value,
                antonyms: document.getElementById('f-ant').value,
                definition: document.getElementById('f-def').value,
                tip: document.getElementById('f-tip').value,
                example: document.getElementById('f-ex').value
            };
            if (id) await _client.from('vocabulary').update(payload).eq('id', id);
            else await _client.from('vocabulary').insert([payload]);
            location.reload();
        });

        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function hideDetail() { document.getElementById('detailView').classList.add('hidden'); }
        function filterWords(l, b) { libFilter = l; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); renderWords(); }
        function updateUI(l, e) { if(l) { document.getElementById('authSection').innerHTML = `<span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">${e}</span><button onclick="_client.auth.signOut().then(()=>location.reload())" class="text-[10px] font-black text-red-400 uppercase tracking-widest ml-4">Exit</button>`; if(userRole==='admin') document.getElementById('adminBtn').classList.remove('hidden'); } }
        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            await _client.auth.signInWithPassword({ email, password });
            location.reload();
        }
        checkSession();
    </script>
</body>
</html>
