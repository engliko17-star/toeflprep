        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' }
                    }
                }
            }
        }

        function speakVerbForms(v1, v2, v3) {
            window.speechSynthesis.cancel();
            const forms = [v1, v2, v3];
            let delay = 0;
            forms.forEach((text) => {
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }, delay);
                delay += 1000;
            });
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>

                verbsView.classList.remove('hidden');
                navVerbs.classList.add('active');
                navVoc.classList.remove('active');
                renderVerbs();
            } else {
                vocView.classList.remove('hidden');
                verbsView.classList.add('hidden');
                navVoc.classList.add('active');
                navVerbs.classList.remove('active');
                switchView('home');
            }
            window.scrollTo(0, 0);
        }

        function renderVerbs(data = irregularVerbs) {
            const tbody = document.getElementById('verbsTableBody');
            tbody.innerHTML = data.map(v => `
                <tr class="verb-row">
                    <td class="p-8">
                        <div class="flex items-center gap-4">
                            <button onclick="speakVerbForms('${v.v1}', '${v.v2}', '${v.v3}')" class="audio-btn shadow-sm" title="Listen all forms">
                                <i class="fa-solid fa-volume-high text-[10px]"></i>
                            </button>
                            <span class="font-bold text-gray-800 text-lg">${v.v1}</span> 
                        </div>
                    </td>
                    <td class="p-8 text-brand font-black text-lg">${v.v2}</td>
                    <td class="p-8 text-brand font-black text-lg">${v.v3}</td>
                    <td class="p-8 text-gray-400 text-right font-medium">${v.tr}</td>
                </tr>
            `).join('');
        }

        function filterVerbsTable() {
            const q = document.getElementById('verbSearch').value.toLowerCase();
            const filtered = irregularVerbs.filter(v => 
                v.v1.toLowerCase().includes(q) || 
                v.v2.toLowerCase().includes(q) || 
                v.v3.toLowerCase().includes(q) || 
                v.tr.toLowerCase().includes(q)
            );
            renderVerbs(filtered);
        }

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profiles } = await _client.from('profiles').select('role').eq('id', currentUser.id);
                userRole = profiles?.[0]?.role || 'student';
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
                updateUI(true, currentUser.email);
                await loadUserProgress();
                await loadWords();
            }
        }

        async function loadUserProgress() {
            const { data } = await _client.from('user_progress').select('word_id, status').eq('user_id', currentUser.id);
            userProgressMap = {};
            data?.forEach(item => userProgressMap[item.word_id] = item.status);
        }

        async function loadWords() {
            const { data } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            wordsData = data || [];
            renderWords();
        }

        function switchView(view) { activeView = view; renderWords(); }

        function renderWords() {
            const libGrid = document.getElementById('wordsGrid');
            const myGrid = document.getElementById('myWordsGrid');
            const libSec = document.getElementById('librarySection');
            const mySec = document.getElementById('myProgressSection');
            const divider = document.getElementById('mainDivider');

            if (activeView === 'home') {
                libSec.classList.remove('hidden');
                mySec.classList.remove('hidden');
                divider.classList.remove('hidden');
                document.getElementById('myWordsBack').classList.add('hidden');
                document.getElementById('libBack').classList.add('hidden');
            } else if (activeView === 'my-all') {
                libSec.classList.add('hidden');
                divider.classList.add('hidden');
                mySec.classList.remove('hidden');
                document.getElementById('myWordsBack').classList.remove('hidden');
            } else {
                mySec.classList.add('hidden');
                divider.classList.add('hidden');
                libSec.classList.remove('hidden');
                document.getElementById('libBack').classList.remove('hidden');
            }

            let myWords = wordsData.filter(w => userProgressMap[w.id] === myFilter);
            myGrid.innerHTML = myWords.length > 0 ? myWords.slice(0, 20).map(w => createCardHtml(w)).join('') : `<div class="col-span-full py-10 text-center text-gray-300 font-black uppercase tracking-widest text-[10px]">Empty</div>`;

            let filteredLib = libFilter === 'All' ? wordsData : wordsData.filter(w => w.level === libFilter);
            libGrid.innerHTML = filteredLib.slice(0, 20).map(w => createCardHtml(w)).join('');
        }

        function createCardHtml(w) {
            const status = userProgressMap[w.id];
            return `<div class="word-card p-8 rounded-[35px] flex flex-col justify-between min-h-[280px] cursor-pointer" onclick="showDetail('${w.id}')">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-2xl font-black text-gray-800 tracking-tighter">${w.word}</h3>
                    </div>
                    <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-4">${w.pos}</p>
                    <p class="text-gray-500 text-xs font-medium line-clamp-3">${w.definition}</p>
                </div>
                <div class="mt-8 flex justify-between items-center border-t border-gray-50 pt-4">
                    <span class="text-[9px] font-black text-brand uppercase tracking-widest">${w.level}</span>
                    <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-400 hover:text-gray-900 transition"><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>`;
        }

        function updateUI(l, e) {
            if(l) {
                document.getElementById('authSection').innerHTML = `<span class="text-[10px] font-black text-gray-400 uppercase">${e}</span><button onclick="_client.auth.signOut().then(()=>location.reload())" class="text-[10px] font-black text-red-400 uppercase ml-4">Exit</button>`;
                if(userRole==='admin') document.getElementById('adminBtn').classList.remove('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const { error } = (type === 'login') ? await _client.auth.signInWithPassword({ email, password }) : await _client.auth.signUp({ email, password });
            if (error) alert(error.message); else location.reload();
        }

        checkSession();
    </script>
</body>
</html>
