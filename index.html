<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Prep Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { light: '#F3E8FF', DEFAULT: '#b593c4', dark: '#9a7aa8' } }
                }
            }
        }
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .word-card { transition: all 0.3s ease; border: 0.5px solid rgba(181, 147, 196, 0.3); background: white; border-radius: 35px; }
        .word-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -15px rgba(181, 147, 196, 0.15); }
        .nav-link { font-weight: 800; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #94a3b8; }
        .nav-link.active { color: #1e293b; border-bottom: 2px solid #b593c4; }
        .filter-btn { border-radius: 9999px; padding: 8px 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid #e2e8f0; color: #64748b; }
        .filter-btn.active { background-color: #b593c4; color: white; border-color: #b593c4; }
        .detail-badge { background: #f3f4f6; color: #b593c4; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .side-card { border-radius: 20px; padding: 20px; border: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <nav id="navBar" class="hidden bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-12">
            <div class="font-black text-2xl text-gray-900 tracking-tighter cursor-pointer" onclick="location.reload()">TOEFL.ai</div>
            <div class="flex gap-8">
                <a href="#" class="nav-link active">Vocabulary</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="hidden bg-brand/10 text-brand px-5 py-2 rounded-full text-[10px] font-black uppercase hover:bg-brand hover:text-white transition">Teacher Cabinet</button>
            <div id="authSection"></div>
        </div>
    </nav>

    <main id="mainContent" class="hidden max-w-7xl mx-auto px-8 py-12">
        <section id="librarySection">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                <h2 class="text-4xl font-black text-gray-900 tracking-tighter">Vocabulary Hub</h2>
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button onclick="filterWords('All', this)" class="filter-btn active">All</button>
                    <button onclick="filterWords('Advanced', this)" class="filter-btn">Advanced</button>
                    <button onclick="filterWords('Intermediate', this)" class="filter-btn">Intermediate</button>
                </div>
            </div>
            <div id="wordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <div class="h-px bg-gray-100 my-16"></div>
        <section id="myProgressSection">
            <h2 class="text-2xl font-black mb-8">My Words</h2>
            <div id="myWordsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <div id="detailView" class="hidden fixed inset-0 z-[100] bg-white overflow-y-auto">
            <header class="flex justify-between items-center px-8 py-6 border-b border-gray-50 sticky top-0 bg-white/90 z-10">
                <button onclick="hideDetail()" class="text-gray-400 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> К центру</button>
                <div class="flex items-center gap-4">
                    <button id="editBtn" onclick="openEditMode()" class="hidden w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-pen-to-square"></i></button>
                    <div id="statusButtons" class="flex gap-2"></div>
                </div>
            </header>
            <div id="detailContent" class="max-w-6xl mx-auto px-8 py-16"></div>
        </div>

        <section id="adminPanel" class="hidden mt-20 p-10 bg-gray-900 rounded-[50px] text-white">
            <div class="flex justify-between items-center mb-8">
                <h2 id="adminTitle" class="text-2xl font-black">Add Word</h2>
                <button onclick="toggleAdminPanel()" class="text-white/40"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="addWordForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="hidden" id="f-id">
                <input type="text" id="f-word" class="bg-white/10 rounded-2xl p-4 outline-none" placeholder="Word" required>
                <select id="f-level" class="bg-white/10 rounded-2xl p-4 outline-none">
                    <option>Advanced</option>
                    <option>Upper-Intermediate</option>
                    <option>Intermediate</option>
                    <option>Elementary</option>
                </select>
                <input type="text" id="f-pos" class="bg-white/10 rounded-2xl p-4 outline-none" placeholder="Part of Speech (глагол, сущ. и т.д.)">
                <input type="number" id="f-progress" class="bg-white/10 rounded-2xl p-4 outline-none" placeholder="Progress %" min="0" max="100">
                <input type="text" id="f-syn" class="bg-white/10 rounded-2xl p-4 outline-none" placeholder="Synonyms (Синонимы)">
                <input type="text" id="f-ant" class="bg-white/10 rounded-2xl p-4 outline-none" placeholder="Antonyms (Антонимы)">
                <textarea id="f-def" class="md:col-span-2 bg-white/10 rounded-2xl p-4 outline-none" placeholder="Definition (Определение)"></textarea>
                <textarea id="f-tip" class="md:col-span-2 bg-white/10 rounded-2xl p-4 outline-none" placeholder="Usage Tip (Совет)"></textarea>
                <textarea id="f-ex" class="md:col-span-2 bg-white/10 rounded-2xl p-4 outline-none" placeholder="Context Example"></textarea>
                <button type="submit" id="submitBtn" class="md:col-span-2 bg-brand py-5 rounded-2xl font-black uppercase">Save Word</button>
            </form>
        </section>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-12 rounded-[50px] text-center">
            <h3 class="text-4xl font-black mb-8 text-gray-900">TOEFL.ai</h3>
            <input type="email" id="authEmail" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-2xl mb-4 outline-none">
            <input type="password" id="authPass" placeholder="Password" class="w-full p-5 bg-gray-50 rounded-2xl mb-6 outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-brand text-white font-black py-5 rounded-2xl">Login</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rtvvilwwlgguzfncqatb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_44KE_hMHou4L53IykmUCvQ_cPahzba1';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let wordsData = [];
        let userProgressMap = {};
        let libFilter = 'All';
        let userRole = 'student';
        let currentUser = null;

        async function checkSession() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data: profiles } = await _client.from('profiles').select('role').eq('id', currentUser.id);
                userRole = profiles?.[0]?.role || 'student';
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('authModal').classList.add('hidden');
                updateUI(true, currentUser.email);
                await loadUserProgress();
                loadWords();
            }
        }

        async function loadUserProgress() {
            const { data } = await _client.from('user_progress').select('word_id, status').eq('user_id', currentUser.id);
            userProgressMap = {};
            data?.forEach(item => userProgressMap[item.word_id] = item.status);
        }

        async function loadWords() {
            const { data, error } = await _client.from('vocabulary').select('*').order('created_at', { ascending: false });
            if (!error) { wordsData = data; renderWords(); }
        }

        function renderWords() {
            const libGrid = document.getElementById('wordsGrid');
            const myGrid = document.getElementById('myWordsGrid');
            libGrid.innerHTML = ''; myGrid.innerHTML = '';

            let filtered = libFilter === 'All' ? wordsData : wordsData.filter(w => w.level === libFilter);
            libGrid.innerHTML = filtered.map(w => createCardHtml(w)).join('');
            
            let myWords = wordsData.filter(w => userProgressMap[w.id]);
            myGrid.innerHTML = myWords.map(w => createCardHtml(w)).join('');
        }

        function createCardHtml(w) {
            const status = userProgressMap[w.id];
            return `
                <div class="word-card p-8 flex flex-col justify-between min-h-[280px] cursor-pointer" onclick="showDetail('${w.id}')">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-black text-gray-800 tracking-tighter">${w.word}</h3>
                            <div class="flex gap-1">
                                <button onclick="updateStatus('${w.id}', 'learning', event)" class="w-8 h-8 rounded-full border transition flex items-center justify-center ${status === 'learning' ? 'bg-amber-400 text-white border-amber-400' : 'bg-gray-50 text-gray-300'}"><i class="fa-solid fa-bolt text-[10px]"></i></button>
                                <button onclick="updateStatus('${w.id}', 'mastered', event)" class="w-8 h-8 rounded-full border transition flex items-center justify-center ${status === 'mastered' ? 'bg-green-500 text-white border-green-500' : 'bg-gray-50 text-gray-300'}"><i class="fa-solid fa-check text-[10px]"></i></button>
                            </div>
                        </div>
                        <p class="text-gray-400 text-[10px] font-black uppercase mb-4">${w.pos}</p>
                        <p class="text-gray-500 text-xs leading-relaxed line-clamp-3">${w.definition}</p>
                    </div>
                    <div class="mt-8 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                             <div class="w-7 h-7 rounded-full border-2 border-brand/20 flex items-center justify-center text-[9px] font-black text-brand">${w.progress || 0}%</div>
                             <span class="text-[9px] font-black text-brand uppercase">${w.level}</span>
                        </div>
                        <button onclick="event.stopPropagation(); speak('${w.word}')" class="text-gray-300 hover:text-brand"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                </div>`;
        }

        async function updateStatus(wordId, status, e) {
            if (e) e.stopPropagation();
            if (status === userProgressMap[wordId]) {
                await _client.from('user_progress').delete().eq('user_id', currentUser.id).eq('word_id', wordId);
                delete userProgressMap[wordId];
            } else {
                await _client.from('user_progress').upsert({ user_id: currentUser.id, word_id: wordId, status: status }, { onConflict: 'user_id, word_id' });
                userProgressMap[wordId] = status;
            }
            renderWords();
            if (!document.getElementById('detailView').classList.contains('hidden')) showDetail(wordId);
        }

        function showDetail(id) {
            const w = wordsData.find(item => item.id === id);
            if (!w) return;
            const status = userProgressMap[w.id];
            if (userRole === 'admin') document.getElementById('editBtn').classList.remove('hidden');
            
            document.getElementById('statusButtons').innerHTML = `
                <button onclick="updateStatus('${w.id}', 'learning')" class="px-6 py-2 rounded-full text-[10px] font-bold ${status === 'learning' ? 'bg-amber-400 text-white' : 'bg-gray-50 text-gray-400'}">Обучение</button>
                <button onclick="updateStatus('${w.id}', 'mastered')" class="px-6 py-2 rounded-full text-[10px] font-bold ${status === 'mastered' ? 'bg-green-500 text-white' : 'bg-gray-50 text-gray-400'}">Освоено</button>`;
            
            document.getElementById('detailContent').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-2 space-y-12">
                        <div>
                            <span class="detail-badge">${w.level}</span>
                            <div class="flex items-center gap-6 mt-6">
                                <h2 class="text-8xl font-black text-gray-900 tracking-tighter">${w.word}</h2>
                                <button onclick="speak('${w.word}')" class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 hover:text-brand"><i class="fa-solid fa-volume-high text-xl"></i></button>
                            </div>
                            <p class="text-gray-400 font-bold mt-2">${w.pos}</p>
                        </div>
                        <div>
                            <h4 class="text-gray-300 font-black text-[10px] uppercase mb-6">ОПРЕДЕЛЕНИЕ</h4>
                            <p class="text-4xl font-bold text-gray-800">${w.definition}</p>
                        </div>
                        <div class="bg-gray-900 text-white p-10 rounded-[40px] shadow-xl italic">"${w.example}"</div>
                    </div>
                    <div class="space-y-6">
                        <div class="side-card bg-green-50/50 border-green-100">
                            <h4 class="text-green-600/50 font-black text-[9px] uppercase mb-4">СИНОНИМЫ</h4>
                            <p class="text-green-800 font-bold text-xl">${w.synonyms || '—'}</p>
                        </div>
                        <div class="side-card bg-red-50/50 border-red-100">
                            <h4 class="text-red-600/50 font-black text-[9px] uppercase mb-4">АНТОНИМЫ</h4>
                            <p class="text-red-800 font-bold text-xl">${w.antonyms || '—'}</p>
                        </div>
                        <div class="side-card bg-brand/5 border-brand/10">
                            <h4 class="text-brand font-black text-[9px] uppercase mb-4">ПРОГРЕСС</h4>
                            <div class="flex items-center gap-4">
                                <div class="text-4xl font-black text-brand">${w.progress || 0}%</div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase leading-tight">Хорошая работа!</p>
                            </div>
                        </div>
                        ${w.tip ? `
                        <div class="side-card bg-amber-50 border-amber-100">
                            <h4 class="text-amber-600 font-black text-[9px] uppercase mb-2 flex items-center gap-2"><i class="fa-solid fa-lightbulb"></i> СОВЕТ</h4>
                            <p class="text-amber-900 text-sm font-medium leading-relaxed">${w.tip}</p>
                        </div>` : ''}
                    </div>
                </div>`;
            document.getElementById('detailView').classList.remove('hidden');
        }

        function openEditMode() {
            const w = wordsData.find(item => item.id === currentDetailId);
            if (!w) return;
            document.getElementById('f-id').value = w.id;
            document.getElementById('f-word').value = w.word;
            document.getElementById('f-level').value = w.level;
            document.getElementById('f-pos').value = w.pos;
            document.getElementById('f-progress').value = w.progress || 0;
            document.getElementById('f-syn').value = w.synonyms || '';
            document.getElementById('f-ant').value = w.antonyms || '';
            document.getElementById('f-def').value = w.definition;
            document.getElementById('f-tip').value = w.tip || '';
            document.getElementById('f-ex').value = w.example;
            hideDetail();
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        document.getElementById('addWordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const payload = {
                word: document.getElementById('f-word').value,
                level: document.getElementById('f-level').value,
                pos: document.getElementById('f-pos').value,
                progress: parseInt(document.getElementById('f-progress').value) || 0,
                synonyms: document.getElementById('f-syn').value,
                antonyms: document.getElementById('f-ant').value,
                definition: document.getElementById('f-def').value,
                tip: document.getElementById('f-tip').value,
                example: document.getElementById('f-ex').value
            };
            if (id) await _client.from('vocabulary').update(payload).eq('id', id);
            else await _client.from('vocabulary').insert([payload]);
            location.reload();
        });

        function toggleAdminPanel() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function hideDetail() { document.getElementById('detailView').classList.add('hidden'); }
        function filterWords(l, b) { libFilter = l; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); renderWords(); }
        function updateUI(l, e) { if(l) { document.getElementById('authSection').innerHTML = `<span class="text-[10px] font-black text-gray-400">${e}</span>`; if(userRole==='admin') document.getElementById('adminBtn').classList.remove('hidden'); } }
        async function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            await _client.auth.signInWithPassword({ email, password });
            location.reload();
        }
        checkSession();
    </script>
</body>
</html>
